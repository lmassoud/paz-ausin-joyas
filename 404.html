<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Página no encontrada · Paz Ausin Joyas</title>
<meta name="theme-color" content="#0B0A09">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: #0B0A09; color: #EDE9E2;
    font-family: 'Jost', sans-serif; font-weight: 300;
  }
  .wrap {
    min-height: 100%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 22px;
  }
  .star { color: #C6A15B; font-size: 28px; margin-bottom: 22px; }
  h1 {
    font-family: 'Cormorant Garamond', serif; font-weight: 500;
    font-size: clamp(36px, 9vw, 56px); margin: 0 0 14px; letter-spacing: 0.01em;
  }
  p {
    max-width: 380px; margin: 0 0 34px; font-size: 15px; line-height: 1.8;
    letter-spacing: 0.03em; color: #A7A29A;
  }
  a.btn {
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    background: #C6A15B; color: #100E08; font-size: 13px; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 13px 26px; border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="star">✦</div>
    <h1>Página no encontrada</h1>
    <p>Esta página no existe o se movió de lugar.</p>
    <a class="btn" href="index.html">Volver al catálogo</a>
  </div>
</body>
